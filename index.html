<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>אל תירא - חברים בממ"ד</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="app-body">

<div class="animated-background"></div>

<!-- אפקטים קוליים -->

<audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio> <audio id="background-music" src="https://audio.jukehost.co.uk/5nI10rW44LqXv4M8194j2J0f3t9e0y1v" loop preload="auto"></audio>

<div id="app-container" class="p-6 relative">

<!-- ================= מסך בית ================= -->

<div id="home" class="screen active mt-4 fade-in">

<header class="text-center mb-8">

<div class="text-6xl mb-2 owl">🦉</div>

<h1 class="text-5xl font-extrabold text-sky-600 mb-2 drop-shadow-md">
אל תירא
</h1>

<p class="text-lg text-sky-500 font-bold">
המחנה השמח שלנו
</p>

</header>

<div class="space-y-4">

<!-- זמן משחק -->

<div onclick="navigateTo('games-menu')" class="cute-card hover-card p-4 flex items-center gap-4 cursor-pointer btn-press bg-white">

<div class="bg-emerald-100 p-3 rounded-2xl text-emerald-500 text-3xl">
🎮
</div>

<div>

<h2 class="text-xl font-bold text-slate-700 mb-1">
זמן משחק!
</h2>

<p class="text-slate-500 text-sm">
איקס עיגול וחידונים
</p>

</div>

</div>

<!-- סיפורי צדיקים -->

<div onclick="navigateTo('stories-menu')" class="cute-card hover-card p-4 flex items-center gap-4 cursor-pointer btn-press bg-white">

<div class="bg-indigo-100 p-3 rounded-2xl text-indigo-500 text-3xl">
📜
</div>

<div>

<h2 class="text-xl font-bold text-slate-700 mb-1">
סיפורי צדיקים
</h2>

<p class="text-slate-500 text-sm">
סיפורים מרתקים ומחזקים
</p>

</div>

</div>

<!-- שער הביטחון -->

<div onclick="navigateTo('bitachon-menu')" class="cute-card hover-card p-4 flex items-center gap-4 cursor-pointer btn-press bg-white">

<div class="bg-amber-100 p-3 rounded-2xl text-amber-500 text-3xl">
🛡️
</div>

<div>

<h2 class="text-xl font-bold text-slate-700 mb-1">
שער הביטחון
</h2>

<p class="text-slate-500 text-sm">
לימוד חובת הלבבות
</p>

</div>

</div>

<!-- מוזיקת רקע -->

<div class="cute-card hover-card p-4 flex items-center justify-between gap-4 bg-white mt-8 border-2 border-sky-200">

<div class="flex items-center gap-4">

<div class="bg-pink-100 p-3 rounded-2xl text-pink-500 text-3xl">
🎵
</div>

<div>

<h2 class="text-lg font-bold text-slate-700 mb-1">
מוזיקת רקע
</h2>

<p class="text-slate-500 text-xs">
שיר שמחזק את הביטחון והאמונה
</p>

</div>

</div>

<button id="toggle-music" class="music-button bg-pink-400 text-white w-12 h-12 rounded-full flex justify-center items-center font-bold text-lg btn-press shadow-md">
▶️
</button>

</div>

</div>

</div>

<!-- ================= תפריט משחקים ================= -->

<div id="games-menu" class="screen mt-6">

<button onclick="navigateTo('home')" class="btn-back">
🔙 חזרה לתפריט
</button>

<h2 class="text-3xl font-bold text-emerald-600 mb-6 text-center">
במה נשחק? 🎲
</h2>

<div class="space-y-4">

<button onclick="navigateTo('tictactoe')" class="w-full text-right cute-card hover-card p-5 bg-white btn-press flex items-center gap-3">

<span class="text-2xl">
⭕
</span>

<span class="text-xl font-bold text-slate-700">
איקס עיגול
</span>

</button>

<button onclick="loadTrivia('trivia'); navigateTo('trivia-screen');" class="w-full text-right cute-card hover-card p-5 bg-white btn-press flex items-center gap-3">

<span class="text-2xl">
❓
</span>

<span class="text-xl font-bold text-slate-700">
טריוויה פסח
</span>

</button>

<button onclick="loadTrivia('bekiut'); navigateTo('trivia-screen');" class="w-full text-right cute-card hover-card p-5 bg-white btn-press flex items-center gap-3">

<span class="text-2xl">
🧠
</span>

<span class="text-xl font-bold text-slate-700">
חידון בקיאות פסח
</span>

</button>

</div>

</div>

<!-- משחק איקס עיגול -->

<div id="tictactoe" class="screen mt-6">

<button onclick="navigateTo('games-menu')" class="btn-back">
🔙 חזרה למשחקים
</button>

<h2 class="text-3xl font-bold text-emerald-600 mb-6 text-center">
איקס עיגול
</h2>

<div class="cute-card p-6 bg-white text-center">

<div id="tic-tac-toe-board">

<div class="tic-tac-toe-cell" data-cell-index="0"></div>
<div class="tic-tac-toe-cell" data-cell-index="1"></div>
<div class="tic-tac-toe-cell" data-cell-index="2"></div>

<div class="tic-tac-toe-cell" data-cell-index="3"></div>
<div class="tic-tac-toe-cell" data-cell-index="4"></div>
<div class="tic-tac-toe-cell" data-cell-index="5"></div>

<div class="tic-tac-toe-cell" data-cell-index="6"></div>
<div class="tic-tac-toe-cell" data-cell-index="7"></div>
<div class="tic-tac-toe-cell" data-cell-index="8"></div>

</div>

<p id="tic-tac-toe-status" class="text-xl font-bold text-slate-700 mb-4 mt-4">
תורו של: X
</p>

<button onclick="resetTicTacToe()" class="bg-emerald-500 text-white w-full py-3 rounded-xl font-bold btn-press">
התחל מחדש
</button>

</div>

</div>

<!-- מסכי טריוויה וסיפורים נשארים כפי שהיו -->

<script src="data.js"></script>

<script src="app.js"></script>

</body>
</html>
